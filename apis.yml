apis:
  - aid: firecracker:firecracker
    name: Firecracker
    description: >-
      Firecracker is a virtual machine monitor (VMM) that uses the Linux KVM
      virtualization infrastructure to create and manage microVMs. It is
      purpose-built for creating and managing secure, multi-tenant container and
      function-based services. Firecracker powers AWS Lambda and AWS Fargate,
      offering minimal overhead and fast startup times for lightweight
      virtualized workloads.
